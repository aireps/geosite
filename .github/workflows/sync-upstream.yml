name: Sync upstream
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: aireps-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure merge driver for release/
        run: git config merge.theirs.driver "cp -f %B %A"

      - name: Merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/hydraponique/roscomvpn-geosite.git
          git fetch upstream master
          BEFORE=$(git rev-parse HEAD)
          git merge upstream/master --no-edit || {
            echo "::error::Merge conflict — требуется ручное разрешение"
            git merge --abort
            exit 1
          }
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "has_changes=false" >> "$GITHUB_ENV"
            echo "Upstream не изменился, пропускаем push и сборку"
          else
            echo "has_changes=true" >> "$GITHUB_ENV"
            git push origin master
          fi

      - name: Trigger build (with retry)
        if: env.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Attempt ${attempt}: triggering build.yml on master..."
            if gh workflow run build.yml --ref master; then
              echo "Build triggered successfully on attempt ${attempt}"
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              sleep_sec=$((attempt * 5))
              echo "Failed, retrying in ${sleep_sec}s..."
              sleep "${sleep_sec}"
            fi
          done
          echo "::error::Failed to trigger build.yml after 3 attempts"
          exit 1
